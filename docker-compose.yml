services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mysite-app:latest
    container_name: mysite-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      INTEGRATION_SECRET: ${INTEGRATION_SECRET:-}
      GOGOL_DASHBOARD_BASE_URL: ${GOGOL_DASHBOARD_BASE_URL:-http://gogol-dashboard:3000/dashboard}
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: mysite-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - web

# Общая сеть с проектом gogol_tasks (дашборд). На сервере один раз: docker network create web
networks:
  web:
    external: true
    name: web
