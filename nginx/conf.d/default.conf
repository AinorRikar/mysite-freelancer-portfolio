# DNS Docker Compose (чтобы upstream gogol-dashboard не ломал старт nginx, пока дашборд ещё не поднят)
resolver 127.0.0.11 valid=30s ipv6=off;

# Иначе на каждый запрос уходит Connection: upgrade без Upgrade — часть клиентов/HTTP не отдаёт страницу.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Имя контейнера из docker-compose (service name «app» на external-сети web не всегда резолвится между проектами).
upstream nuxt_app {
    server mysite-app:3000;
    keepalive 32;
}

# При server ... resolve директива zone обязательна. Без keepalive — меньше сюрпризов с динамическим DNS.
upstream gogol_dashboard {
    zone gogol_dashboard_shm 64k;
    server gogol-dashboard:3000 resolve;
}

# HTTP: для первого запуска проксирует напрямую.
# После выпуска SSL-сертификата замените содержимое location на:
#   return 301 https://$host$request_uri;
server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 10m;

    # Дашборд (gogol_tasks): тот же хост, префикс /dashboard/ — не индексировать.
    location /dashboard/ {
        add_header X-Robots-Tag "noindex, nofollow" always;

        proxy_pass http://gogol_dashboard;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Prefix /dashboard;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SSE чат и API задач (префикс без завершающего / — совпадает и с .../projects? и .../projects/1/chat/stream)
    location /dashboard/api/projects {
        add_header X-Robots-Tag "noindex, nofollow" always;

        proxy_pass http://gogol_dashboard;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://nuxt_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

