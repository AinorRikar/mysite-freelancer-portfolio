services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mysite-app:latest
    container_name: mysite-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      INTEGRATION_SECRET: ${INTEGRATION_SECRET:-}
      NUXT_INTEGRATION_SECRET: ${INTEGRATION_SECRET:-}
      GOGOL_DASHBOARD_BASE_URL: ${GOGOL_DASHBOARD_BASE_URL:-http://gogol-dashboard:3000/dashboard}
      NUXT_GOGOL_DASHBOARD_BASE_URL: ${GOGOL_DASHBOARD_BASE_URL:-http://gogol-dashboard:3000/dashboard}
    networks:
      - web

# Reverse proxy (80/443) — отдельный репозиторий ../gogol_nginx на той же сети web.
# На сервере один раз: docker network create web
networks:
  web:
    external: true
    name: web
